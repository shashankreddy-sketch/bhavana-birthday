<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bhavana's Birthday 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:#fff;
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
  url('https://images.unsplash.com/photo-1519681393784-d120267933ba');
  background-size:cover;
  background-position:center;
}

.card{
  text-align:center;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  z-index:2;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:2.8rem;
  margin-bottom:15px;
}

.typing{font-size:1.2rem;}
.hidden{margin-top:25px;font-size:1.3rem;}

/* Balloons */
.balloon{
  position:absolute;
  bottom:-100px;
  width:40px;
  height:55px;
  border-radius:50% 50% 45% 45%;
  animation: floatUp linear infinite;
  opacity:0.8;
}

.balloon::after{
  content:'';
  position:absolute;
  width:2px;
  height:40px;
  background:#fff;
  left:50%;
  top:55px;
}

@keyframes floatUp{
  0%{transform:translateY(0) translateX(0)}
  100%{transform:translateY(-110vh) translateX(30px)}
}

/* Particles */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  opacity:0.7;
  animation: drift linear infinite;
}

@keyframes drift{
  0%{transform:translateY(0)}
  100%{transform:translateY(100vh)}
}
</style>
</head>

<body>

<div class="card">
  <h1>Happy Birthday Bhavana 🎉</h1>
  <div class="typing">Wishing you a day filled with happiness and a year filled with joy.</div>
  <div class="hidden">— Shashank</div>
</div>

<script>
// Balloons
for(let i=0;i<10;i++){
  let b=document.createElement("div");
  b.className="balloon";
  b.style.left=Math.random()*100+"vw";
  b.style.animationDuration=(6+Math.random()*4)+"s";
  b.style.background=`hsl(${Math.random()*360},70%,70%)`;
  document.body.appendChild(b);
}

// Particles
for(let i=0;i<40;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(4+Math.random()*4)+"s";
  p.style.background=`hsl(${Math.random()*360},100%,80%)`;
  document.body.appendChild(p);
}
</script>

</body>
</html>
